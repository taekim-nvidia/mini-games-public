}

function updateCredits(dt){
  G.creditsT = (G.creditsT||0) + dt;
  if (Input.Ap || G.creditsT>10){
    G.fade.dir=1;
    G.fade.after = ()=>{
      // Reset progress
      G.mission.completed=[false,false,false];
      G.upgrades.finisher = false;
      G.upgrades.spiderSense = false;
      G.mission.score = 0;
      G.mission.web = 1;
      G.mission.focus = 0;
      G.state='TITLE';
      Title.init();
    };
  }
}
function renderCredits(){
  CTX.fillStyle='#000'; CTX.fillRect(0,0,LW,LH);
  // Web background
  CTX.strokeStyle='rgba(255,255,255,0.1)';
  for (let i=0;i<14;i++){
    CTX.beginPath();
    const a = i/14*Math.PI*2;
    CTX.moveTo(LW/2,LH/2); CTX.lineTo(LW/2+Math.cos(a)*900, LH/2+Math.sin(a)*900);
    CTX.stroke();
  }
  CTX.font='bold 36px sans-serif'; CTX.fillStyle='#c8131c'; CTX.textAlign='center';
  CTX.fillText('SPIDER-MAN', LW/2, 80);
  CTX.font='bold 16px sans-serif'; CTX.fillStyle='#fff';
  let yy = 140;
  const lines = [
    '~ A FRIENDLY NEIGHBORHOOD ADVENTURE ~',
    '',
    'GAME DESIGN  ⚡ Spark2ClawBot',
    'CODE  ⚡ Single HTML file',
    'GRAPHICS  ⚡ Canvas 2D vector',
    'AUDIO  ⚡ Web Audio synthesis',
    '',
    'STARRING',
    'SPIDER-MAN — friendly neighborhood',
    'GREEN GOBLIN — menacing',
    '6 THUGS — bank robbers',
    '4 SNIPERS — train operatives',
    '3 HOSTAGES — saved!',
    '',
    'SCORE: ' + G.mission.score,
    '',
    'THANKS FOR PLAYING',
  ];
  for (const L of lines){
    CTX.fillText(L, LW/2, yy);
    yy += 22;
  }
  CTX.font='14px sans-serif'; CTX.fillStyle='rgba(255,255,255,0.6)';
  if (Math.floor(G.t*2)%2===0) CTX.fillText('PRESS A TO RETURN TO TITLE', LW/2, LH-30);
}

// =======================================================================
// HUD
// =======================================================================
function drawHUD(){
  // Top-left: portrait + hearts + focus
  CTX.save();
  CTX.fillStyle='rgba(0,0,0,0.5)';
  roundRect(8, 8, 200, 60, 8, true, false);
  // portrait
  CTX.save();
  CTX.translate(40, 38);
  CTX.scale(0.7,0.7);
  CTX.fillStyle='#c8131c';
  CTX.beginPath(); CTX.arc(0,0,16,0,Math.PI*2); CTX.fill();
  // web pattern
  CTX.strokeStyle='rgba(0,0,0,0.4)'; CTX.lineWidth=0.8;
  for (let i=-1;i<=1;i++){ CTX.beginPath(); CTX.moveTo(-16,i*5); CTX.lineTo(16,i*5); CTX.stroke(); }
  for (let i=-2;i<=2;i++){ CTX.beginPath(); CTX.moveTo(i*4,-16); CTX.lineTo(i*4,16); CTX.stroke(); }
  // eyes
  CTX.fillStyle='#fff';
  CTX.save(); CTX.translate(-5,-2); CTX.rotate(-0.3); CTX.beginPath(); CTX.ellipse(0,0,5,3,0,0,Math.PI*2); CTX.fill(); CTX.restore();
  CTX.save(); CTX.translate(5,-2); CTX.rotate(0.3); CTX.beginPath(); CTX.ellipse(0,0,5,3,0,0,Math.PI*2); CTX.fill(); CTX.restore();
  CTX.restore();
  // hearts
  for (let i=0;i<3;i++){
    drawHeart(70+i*22, 26, 8, i<G.player?.hp);
  }
  // focus bar
  CTX.fillStyle='rgba(255,255,255,0.2)';
  CTX.fillRect(70, 44, 130, 8);
  CTX.fillStyle='#ff0';
  CTX.fillRect(70, 44, 130 * (G.mission.focus/3), 8);
  CTX.strokeStyle='#000'; CTX.lineWidth=1;
  CTX.strokeRect(70, 44, 130, 8);
  CTX.font='10px sans-serif'; CTX.fillStyle='#fff'; CTX.textAlign='left';
  CTX.fillText('FOCUS', 70, 60);
  CTX.restore();

  // Top-right: web fluid meter
  CTX.save();
  CTX.fillStyle='rgba(0,0,0,0.5)';
  roundRect(LW-160, 8, 150, 38, 8, true, false);
  CTX.fillStyle='#fff'; CTX.font='bold 11px sans-serif'; CTX.textAlign='left';
  CTX.fillText('WEB', LW-152, 22);
  CTX.fillStyle='rgba(255,255,255,0.2)';
  CTX.fillRect(LW-122, 14, 105, 12);
  CTX.fillStyle='#fff';
  CTX.fillRect(LW-122, 14, 105*G.mission.web, 12);
  CTX.strokeStyle='#000'; CTX.strokeRect(LW-122, 14, 105, 12);
  CTX.font='bold 12px sans-serif'; CTX.fillStyle='#ff6';
  CTX.fillText('SCORE: ' + G.mission.score, LW-152, 40);
  CTX.restore();

  // Top-center: objective
  if (G.hud.objective){
    CTX.save();
    CTX.fillStyle='rgba(0,0,0,0.55)';
    const text = G.hud.objective;
    CTX.font='bold 14px sans-serif';
    const w = CTX.measureText(text).width;
    roundRect(LW/2 - w/2 - 12, 8, w+24, 26, 6, true, false);
    CTX.fillStyle='#fff'; CTX.textAlign='center';
    CTX.fillText(text, LW/2, 26);
    CTX.restore();
  }
  if (G.hud.subInfo){
    CTX.save();
    CTX.fillStyle='#ff6';
    CTX.font='bold 18px sans-serif';
    CTX.textAlign='center';
    CTX.fillText(G.hud.subInfo, LW/2, 60);
    CTX.restore();
  }

  // Combo counter
  if (G.mission.combo>0 || G.player?.attack){
    CTX.save();
    const txt = G.mission.combo>0? `COMBO ×${G.mission.combo+1}` : '';
    if (txt){
      CTX.font='bold 22px sans-serif';
      CTX.fillStyle='#ff6'; CTX.textAlign='center';
      CTX.fillText(txt, LW/2, 100);
    }
    if (G.mission.finisherReady){
      CTX.font='bold 14px sans-serif'; CTX.fillStyle='#f60';
      CTX.fillText('FINISHER READY! Press B', LW/2, 120);
    }
    CTX.restore();
  }

  // Boss HP bar (M3)
  if (G.state==='M3' && G.goblin && G.goblin.alive){
    CTX.save();
    CTX.fillStyle='rgba(0,0,0,0.55)';
    roundRect(LW/2-160, LH-36, 320, 22, 6, true, false);
    CTX.fillStyle='#600';
    CTX.fillRect(LW/2-150, LH-30, 300, 10);
    CTX.fillStyle='#0d4';
    CTX.fillRect(LW/2-150, LH-30, 300 * (G.hud.bossHP/G.hud.bossMaxHP), 10);
    CTX.fillStyle='#fff'; CTX.font='bold 11px sans-serif'; CTX.textAlign='center';
    CTX.fillText(`GREEN GOBLIN — Phase ${G.hud.bossPhase}`, LW/2, LH-18);
    CTX.restore();
  }

  // Mission timer (M2)
  if (G.state==='M2' && G.train){
    CTX.save();
    CTX.fillStyle = G.train.timer<10? '#f44' : '#fff';
    CTX.font='bold 22px sans-serif'; CTX.textAlign='center';
    CTX.fillText(Math.ceil(G.train.timer)+'s', LW/2, 60);
    CTX.restore();
  }

  // Spider-sense edge pulse
  if (G.warningPulse>0.05){
    CTX.save();
    CTX.fillStyle = `rgba(255,255,40,${G.warningPulse*0.5})`;
    CTX.fillRect(0,0,LW,8);
    CTX.fillRect(0,LH-8,LW,8);
    CTX.fillRect(0,0,8,LH);
    CTX.fillRect(LW-8,0,8,LH);
    CTX.restore();
  }
}
function drawHeart(x,y,r,filled){
  CTX.save();
  CTX.translate(x,y);
  CTX.beginPath();
  CTX.moveTo(0,r*0.3);
  CTX.bezierCurveTo(-r*1.4,-r*0.6, -r*0.3, -r*1.0, 0, -r*0.4);
  CTX.bezierCurveTo(r*0.3,-r*1.0, r*1.4, -r*0.6, 0, r*0.3);
  CTX.closePath();
  CTX.fillStyle = filled? '#f44':'#444';
  CTX.fill();
  CTX.strokeStyle='#000'; CTX.lineWidth=1; CTX.stroke();
  CTX.restore();
}

// =======================================================================
// MAIN LOOP
// =======================================================================
let last = performance.now();
function loop(now){
  let dt = (now - last)/1000;
  if (dt>0.066) dt = 0.066;
  last = now;
  G.t += dt;

  // Slow-mo
  let gdt = dt;
  if (G.slowmo>0){ gdt = dt*0.30; G.slowmo -= dt; }
  // Pause
  if (Input.paused){ gdt = 0; }

  G.dt = gdt;
  G.flash = Math.max(0, G.flash - dt*2);
  if (G.player){
    G.player.invuln = Math.max(0, G.player.invuln - gdt);
    G.player.dashCooldown = Math.max(0, G.player.dashCooldown - gdt);
    G.player.dodgeFlash = Math.max(0, G.player.dodgeFlash - gdt);
    G.player.finisherActive = Math.max(0, G.player.finisherActive - gdt);
    G.player.hitFlash = Math.max(0, G.player.hitFlash - gdt*4);
  }

  // Update by state
  switch (G.state){
    case 'TITLE': Title.update(gdt); break;
    case 'INTRO': Intro.update(gdt); break;
    case 'HUB': updateHub(gdt); updateCamera(gdt); break;
    case 'BRIEF': updateBrief(gdt); break;
    case 'M1': updateM1(gdt); updateCamera(gdt); break;
    case 'M2': updateM2(gdt); updateCamera(gdt); break;
    case 'M3': updateM3(gdt); updateCamera(gdt); break;
    case 'MCOMPLETE': updateMComplete(gdt); break;
    case 'GAMEOVER': updateGameOver(gdt); break;
    case 'OUTRO': updateOutro(gdt); break;
    case 'CREDITS': updateCredits(gdt); break;
  }

  // Render
  CTX.fillStyle = '#000';
  CTX.fillRect(0,0,LW,LH);
  switch (G.state){
    case 'TITLE': Title.render(); break;
    case 'INTRO': Intro.render(); break;
    case 'HUB': renderHub(); break;
    case 'BRIEF': renderBrief(); break;
    case 'M1': renderM1(); break;
    case 'M2': renderM2(); break;
    case 'M3': renderM3(); break;
    case 'MCOMPLETE': renderMComplete(); break;
    case 'GAMEOVER': renderGameOver(); break;
    case 'OUTRO': renderOutro(); break;
    case 'CREDITS': renderCredits(); break;
  }

  // HUD overlays for in-mission states
  if (G.state==='HUB' || G.state==='M1' || G.state==='M2' || G.state==='M3'){
    drawHUD();
  }

  // Hit flash
  if (G.flash>0){
    CTX.fillStyle = `rgba(255,255,255,${G.flash})`;
    CTX.fillRect(0,0,LW,LH);
  }

  // Fade transition
  if (G.fade.dir!==0){
    G.fade.a += G.fade.dir * dt * 2.0;
    if (G.fade.a >= 1){
      G.fade.a = 1;
      const cb = G.fade.after; G.fade.after = null;
      G.fade.dir = 0;
      if (cb) cb();
    } else if (G.fade.a <= 0){
      G.fade.a = 0; G.fade.dir = 0;
    }
  }
  if (G.fade.a>0){
    CTX.fillStyle = `rgba(0,0,0,${G.fade.a})`;
    CTX.fillRect(0,0,LW,LH);
  }

  // Pause overlay
  if (Input.paused){
    CTX.fillStyle='rgba(0,0,0,0.7)';
    CTX.fillRect(0,0,LW,LH);
    CTX.fillStyle='#fff'; CTX.font='bold 40px sans-serif'; CTX.textAlign='center';
    CTX.fillText('PAUSED', LW/2, LH/2-10);
    CTX.font='14px sans-serif';
    CTX.fillText('Tap pause / press P to resume', LW/2, LH/2+30);
  }

  // Reset per-frame "pressed" flags
  Input.Ap = false; Input.Bp = false; Input.Wp = false;
  Input.Ar = false; Input.Br = false; Input.Wr = false;
  Input.swipeBurst = 0;
  if (Input.A) Input.Aheld += dt; else Input.Aheld = 0;
  if (Input.B) Input.Bheld += dt; else Input.Bheld = 0;
  if (Input.W) Input.Wheld += dt; else Input.Wheld = 0;

  requestAnimationFrame(loop);
}

// =======================================================================
// BOOT
// =======================================================================
Title.init();
requestAnimationFrame(loop);

// Try to load saved progress (optional)
try {
  const sv = JSON.parse(localStorage.getItem('spidey-save')||'null');
  if (sv && sv.completed){
    G.mission.completed = sv.completed;
    G.upgrades = sv.upgrades || G.upgrades;
    G.mission.score = sv.score || 0;
  }
} catch(e){}
function saveProgress(){
  try {
    localStorage.setItem('spidey-save', JSON.stringify({
      completed: G.mission.completed,
      upgrades: G.upgrades,
      score: G.mission.score,
    }));
  } catch(e){}
}
// hook saves on mission complete
const _origComplete = completeMission;
completeMission = function(id){ _origComplete(id); saveProgress(); };

</script>
