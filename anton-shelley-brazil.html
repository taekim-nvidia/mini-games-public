<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Anton & Shelley — Brazil 🇧🇷</title>
<style>
  :root{
    --green:#009c3b;
    --yellow:#ffdf00;
    --blue:#002776;
    --sand:#f4d97a;
    --sea:#1ea7c7;
    --sky:#7fd3ff;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff;overflow:hidden;user-select:none}
  body{
    background:linear-gradient(#7fd3ff 0 55%, #1ea7c7 55% 70%, #f4d97a 70% 100%);
  }
  #hud{
    position:fixed;top:10px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.45);padding:8px 14px;border-radius:12px;
    font-size:14px;display:flex;gap:14px;align-items:center;z-index:5
  }
  #hud .flag{width:22px;height:15px;background:var(--green);position:relative;border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle}
  #hud .flag::before{content:"";position:absolute;top:50%;left:50%;width:14px;height:9px;background:var(--yellow);transform:translate(-50%,-50%) rotate(45deg);}
  #hud .flag::after{content:"";position:absolute;top:50%;left:50%;width:5px;height:5px;background:var(--blue);border-radius:50%;transform:translate(-50%,-50%);}
  #hearts{position:fixed;top:10px;right:10px;background:rgba(0,0,0,.45);padding:6px 12px;border-radius:12px;font-size:14px;z-index:5}
  #scene{position:fixed;inset:0;overflow:hidden}
  .world{position:absolute;inset:0;will-change:transform}
  .sun{position:absolute;left:8%;top:6%;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,#fff7c2,#ffd34d);box-shadow:0 0 40px #ffd34d}
  .palm{position:absolute;bottom:18%;width:90px;height:160px}
  .palm .trunk{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:14px;height:110px;background:linear-gradient(#6b3a17,#8b4f22);border-radius:6px}
  .palm .leaf{position:absolute;top:0;left:50%;width:80px;height:30px;background:#0a8a3a;border-radius:50%;transform-origin:left center}
  .palm .l1{transform:translate(-5%,0) rotate(-30deg)}
  .palm .l2{transform:translate(-5%,0) rotate(30deg)}
  .palm .l3{transform:translate(-95%,0) rotate(-150deg)}
  .palm .l4{transform:translate(-95%,0) rotate(150deg)}
  .palm .l5{transform:translate(-50%,-10px) rotate(0deg)}

  .bigflag{position:absolute;width:160px;height:110px;background:var(--green);border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .bigflag::before{content:"";position:absolute;top:50%;left:50%;width:120px;height:70px;background:var(--yellow);transform:translate(-50%,-50%) rotate(45deg);border-radius:6px}
  .bigflag::after{content:"BRASIL";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:55px;height:55px;background:var(--blue);border-radius:50%;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;letter-spacing:1px}
  .pole{position:absolute;width:6px;background:#bbb;border-radius:3px}

  .mountain{position:absolute;bottom:30%;width:300px;height:160px;background:linear-gradient(#2a7a3a,#0a5a22);clip-path:polygon(0% 100%,15% 60%,30% 80%,50% 30%,70% 70%,85% 50%,100% 100%);}
  .stadium{position:absolute;bottom:30%;width:180px;height:80px;background:#ddd;border-radius:50% 50% 10px 10px / 80% 80% 10px 10px;box-shadow:0 8px 16px rgba(0,0,0,.25)}
  .stadium::after{content:"⚽";position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:28px}

  /* Characters */
  .char{position:absolute;bottom:5%;width:70px;height:120px;transition:transform .15s}
  .char .head{position:absolute;top:0;left:50%;width:34px;height:34px;border-radius:50%;background:#f3c9a0;transform:translateX(-50%);box-shadow:inset -4px -4px 0 rgba(0,0,0,.08)}
  .char .hair{position:absolute;top:-4px;left:50%;width:38px;height:22px;border-radius:50% 50% 30% 30%;transform:translateX(-50%)}
  .char .body{position:absolute;top:30px;left:50%;width:46px;height:46px;background:var(--green);border-radius:10px 10px 8px 8px;transform:translateX(-50%);overflow:hidden;border:2px solid #007a2d}
  .char .body::before{content:"";position:absolute;top:50%;left:50%;width:34px;height:22px;background:var(--yellow);transform:translate(-50%,-50%) rotate(45deg);border-radius:4px}
  .char .body::after{content:"";position:absolute;top:50%;left:50%;width:14px;height:14px;background:var(--blue);border-radius:50%;transform:translate(-50%,-50%)}
  .char .arm{position:absolute;top:34px;width:10px;height:34px;background:#f3c9a0;border-radius:6px;transition:transform .2s}
  .char .arm.l{left:6px;transform-origin:top center;transform:rotate(15deg)}
  .char .arm.r{right:6px;transform-origin:top center;transform:rotate(-15deg)}
  .char .leg{position:absolute;bottom:0;width:12px;height:30px;background:#1d3a8a;border-radius:4px}
  .char .leg.l{left:18px}
  .char .leg.r{right:18px}
  .char .shoe{position:absolute;bottom:-4px;width:18px;height:8px;background:#222;border-radius:4px}
  .char .shoe.l{left:15px}
  .char .shoe.r{right:15px}

  #anton .hair{background:#3a2a1a}
  #shelley .hair{background:#6b3a17;width:42px;height:34px;border-radius:50% 50% 40% 40%;top:-6px}
  #shelley .head{background:#fbd4b4}
  #shelley .body{border-color:#007a2d}
  #shelley .lips{position:absolute;top:22px;left:50%;width:6px;height:3px;background:#c0392b;border-radius:50%;transform:translateX(-50%)}

  .walk #anton{animation:bob .35s infinite}
  .walk #anton .leg.l{animation:legA .35s infinite}
  .walk #anton .leg.r{animation:legB .35s infinite}
  @keyframes bob{50%{transform:translateY(-2px)}}
  @keyframes legA{0%,100%{transform:rotate(15deg)}50%{transform:rotate(-15deg)}}
  @keyframes legB{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}

  /* States */
  .holding #shelley{transform:translateX(-46px)}
  .holding #shelley .arm.r{transform:rotate(70deg)}
  .holding #anton .arm.l{transform:rotate(-70deg)}

  .hugging #shelley{transform:translateX(-30px) scale(.98)}
  .hugging #anton .arm.l{transform:rotate(-110deg)}
  .hugging #anton .arm.r{transform:rotate(-60deg)}
  .hugging #shelley .arm.l{transform:rotate(110deg)}
  .hugging #shelley .arm.r{transform:rotate(60deg)}

  .kissing #shelley{transform:translateX(-44px)}
  .kissing #anton{transform:translateX(2px)}
  .kissing #shelley::after,
  .kissing #anton::after{content:"💋";position:absolute;top:14px;left:60%;font-size:18px;animation:pop .6s ease-out}
  @keyframes pop{from{transform:translateY(0) scale(.6);opacity:0}to{transform:translateY(-20px) scale(1.4);opacity:0}}

  .carrying #shelley{transform:translate(-10px,-50px) rotate(-12deg)}
  .carrying #shelley .leg.l, .carrying #shelley .leg.r{transform:rotate(70deg) translateX(6px)}
  .carrying #anton .arm.l{transform:rotate(-90deg)}
  .carrying #anton .arm.r{transform:rotate(-100deg)}

  /* Floating hearts */
  .heart{position:fixed;font-size:24px;pointer-events:none;animation:float 1.6s ease-out forwards;z-index:6}
  @keyframes float{
    from{transform:translateY(0) scale(.6);opacity:1}
    to{transform:translateY(-120px) scale(1.5);opacity:0}
  }

  /* Mobile controls */
  #controls{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:10px;flex-wrap:wrap;justify-content:center;z-index:5;max-width:96vw}
  .btn{background:rgba(0,0,0,.55);color:#fff;border:none;padding:10px 14px;border-radius:14px;font-size:14px;cursor:pointer;backdrop-filter:blur(4px)}
  .btn:active{transform:scale(.95)}
  .btn.dir{font-size:22px;width:54px;height:54px;display:flex;align-items:center;justify-content:center}
  .row{display:flex;gap:8px;align-items:center}
  #help{position:fixed;bottom:90px;left:10px;font-size:11px;opacity:.8;background:rgba(0,0,0,.4);padding:6px 10px;border-radius:10px;z-index:5;max-width:200px}

  /* Distant figure when not near */
  .far #shelley{filter:none}
  .prompt{position:absolute;top:-26px;left:50%;transform:translateX(-50%);background:#fff;color:#222;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap;animation:bounce 1s infinite}
  @keyframes bounce{50%{transform:translateX(-50%) translateY(-4px)}}
</style>
</head>
<body>

<div id="hud">
  <span class="flag"></span>
  <strong>Anton & Shelley in Brasil</strong>
  <span class="flag"></span>
</div>
<div id="hearts">❤️ <span id="heartCount">0</span></div>

<div id="scene">
  <div class="world" id="world">
    <div class="sun"></div>

    <!-- Background layer (mountains, stadium) -->
    <div class="mountain" style="left:200px"></div>
    <div class="mountain" style="left:1400px;transform:scaleX(-1)"></div>
    <div class="stadium" style="left:800px"></div>
    <div class="stadium" style="left:2400px"></div>

    <!-- Flags on poles -->
    <div class="pole" style="left:500px;bottom:30%;height:220px"></div>
    <div class="bigflag" style="left:504px;bottom:calc(30% + 110px)"></div>

    <div class="pole" style="left:1800px;bottom:30%;height:220px"></div>
    <div class="bigflag" style="left:1804px;bottom:calc(30% + 110px)"></div>

    <div class="pole" style="left:3000px;bottom:30%;height:220px"></div>
    <div class="bigflag" style="left:3004px;bottom:calc(30% + 110px)"></div>

    <!-- Palms -->
    <div class="palm" style="left:100px"><div class="trunk"></div><div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div><div class="leaf l4"></div><div class="leaf l5"></div></div>
    <div class="palm" style="left:1100px"><div class="trunk"></div><div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div><div class="leaf l4"></div><div class="leaf l5"></div></div>
    <div class="palm" style="left:2200px"><div class="trunk"></div><div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div><div class="leaf l4"></div><div class="leaf l5"></div></div>
    <div class="palm" style="left:3300px"><div class="trunk"></div><div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div><div class="leaf l4"></div><div class="leaf l5"></div></div>

    <!-- Characters -->
    <div class="char" id="anton" style="left:200px">
      <div class="hair"></div>
      <div class="head"></div>
      <div class="body"></div>
      <div class="arm l"></div>
      <div class="arm r"></div>
      <div class="leg l"></div>
      <div class="leg r"></div>
      <div class="shoe l"></div>
      <div class="shoe r"></div>
    </div>

    <div class="char" id="shelley" style="left:1500px">
      <div class="hair"></div>
      <div class="head"></div>
      <div class="lips"></div>
      <div class="body"></div>
      <div class="arm l"></div>
      <div class="arm r"></div>
      <div class="leg l"></div>
      <div class="leg r"></div>
      <div class="shoe l"></div>
      <div class="shoe r"></div>
      <div class="prompt" id="prompt">Подойди ко мне 💕</div>
    </div>
  </div>
</div>

<div id="help">← → или A/D — ходить. Кнопки ниже — взаимодействия (когда Shelley рядом).</div>

<div id="controls">
  <button class="btn dir" id="left">◀</button>
  <button class="btn dir" id="right">▶</button>
  <button class="btn" id="hand">🤝 За руку</button>
  <button class="btn" id="hug">🤗 Обнять</button>
  <button class="btn" id="kiss">💋 Поцеловать</button>
  <button class="btn" id="carry">👶 На руки</button>
</div>

<script>
(() => {
  const world = document.getElementById('world');
  const scene = document.getElementById('scene');
  const anton = document.getElementById('anton');
  const shelley = document.getElementById('shelley');
  const prompt = document.getElementById('prompt');
  const heartCountEl = document.getElementById('heartCount');

  let antonX = 200;
  let shelleyX = 1500;
  const worldW = 3600;
  let dir = 0; // -1,0,1
  let hearts = 0;
  let state = null; // 'holding'|'hugging'|'kissing'|'carrying'

  function setState(s){
    ['holding','hugging','kissing','carrying'].forEach(c=>scene.classList.remove(c));
    state = s;
    if(s) scene.classList.add(s);
  }

  function addHeart(emoji='❤️'){
    hearts++;
    heartCountEl.textContent = hearts;
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = emoji;
    h.style.left = (window.innerWidth/2 - 20 + (Math.random()*40-20)) + 'px';
    h.style.top = (window.innerHeight/2 - 40) + 'px';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(), 1600);
  }

  function near(){ return Math.abs(antonX - shelleyX) < 90; }

  function update(){
    // movement
    if(dir !== 0 && !state){
      antonX += dir * 4;
      antonX = Math.max(40, Math.min(worldW-100, antonX));
      scene.classList.add('walk');
    } else {
      scene.classList.remove('walk');
    }

    // when holding/carrying — shelley follows anton
    if(state === 'holding' || state === 'carrying'){
      shelleyX = antonX + 50;
      if(dir !== 0){
        antonX += dir * 3;
        antonX = Math.max(40, Math.min(worldW-100, antonX));
        shelleyX = antonX + 50;
        scene.classList.add('walk');
      }
    }

    anton.style.left = antonX + 'px';
    shelley.style.left = shelleyX + 'px';

    // flip when walking left
    anton.style.transform = (dir < 0 ? 'scaleX(-1)' : 'scaleX(1)');

    // camera follow
    const camX = Math.max(0, Math.min(worldW - window.innerWidth, antonX - window.innerWidth/2 + 35));
    world.style.transform = `translateX(${-camX}px)`;

    // prompt visibility
    prompt.style.opacity = (near() && !state) ? 1 : 0;

    requestAnimationFrame(update);
  }
  update();

  // Controls
  const keys = {};
  window.addEventListener('keydown', e=>{
    keys[e.key.toLowerCase()] = true;
    updateDir();
    if(e.key === 'Escape') setState(null);
  });
  window.addEventListener('keyup', e=>{
    keys[e.key.toLowerCase()] = false;
    updateDir();
  });
  function updateDir(){
    if(keys['arrowleft']||keys['a']) dir = -1;
    else if(keys['arrowright']||keys['d']) dir = 1;
    else dir = 0;
  }

  function holdBtn(id, d){
    const el = document.getElementById(id);
    const on = ()=>{ dir = d; };
    const off = ()=>{ dir = 0; };
    el.addEventListener('mousedown', on); el.addEventListener('mouseup', off); el.addEventListener('mouseleave', off);
    el.addEventListener('touchstart', e=>{e.preventDefault();on();}, {passive:false});
    el.addEventListener('touchend', off);
  }
  holdBtn('left', -1);
  holdBtn('right', 1);

  function action(name, emoji, duration){
    if(!near()){
      // little shake / hint
      prompt.textContent = 'Сначала подойди! 👉';
      prompt.style.opacity = 1;
      setTimeout(()=>{ prompt.textContent='Подойди ко мне 💕'; }, 1200);
      return;
    }
    setState(name);
    addHeart(emoji);
    if(duration){
      setTimeout(()=>{
        if(state === name && name !== 'holding' && name !== 'carrying') setState(null);
      }, duration);
    }
  }

  document.getElementById('hand').onclick = ()=>{
    if(state === 'holding'){ setState(null); return; }
    action('holding','🤝');
  };
  document.getElementById('hug').onclick = ()=> action('hugging','🤗', 1500);
  document.getElementById('kiss').onclick = ()=> action('kissing','💋', 1200);
  document.getElementById('carry').onclick = ()=>{
    if(state === 'carrying'){ setState(null); return; }
    action('carrying','💖');
  };

})();
</script>
</body>
</html>
